<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嚴選美食文案生成器</title>
    <style>
        :root {
            --brand: #ea580c;
            --brand-light: #fff7ed;
            --brand-dark: #c2410c;
            --bg: #fafaf9;
            --card: #ffffff;
            --text: #1a1a1a;
            --text-sec: #6b7280;
            --border: #e5e7eb;
            --success: #059669;
            --success-light: #ecfdf5;
            --purple: #7c3aed;
            --purple-light: #f5f3ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
            color: white;
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(234,88,12,0.3);
        }
        .header h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 4px; }
        .header p { font-size: 0.85rem; opacity: 0.9; }
        .stepper {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 20px;
            background: white;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .step {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-sec);
            background: var(--bg);
            transition: all 0.3s;
        }
        .step.active { background: var(--brand); color: white; }
        .step.completed { background: var(--success-light); color: var(--success); }
        .step-num {
            width: 24px; height: 24px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; background: white; color: var(--text-sec);
        }
        .step.active .step-num { background: white; color: var(--brand); }
        .step.completed .step-num { background: var(--success); color: white; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .step-section { display: none; animation: fadeIn 0.4s ease; }
        .step-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }
        .product-card {
            background: white; border: 2px solid var(--border); border-radius: 16px;
            padding: 20px; text-align: center; cursor: pointer; transition: all 0.3s;
        }
        .product-card:hover { border-color: var(--brand); transform: translateY(-4px); box-shadow: 0 8px 24px rgba(234,88,12,0.15); }
        .product-card.selected { border-color: var(--brand); background: var(--brand-light); }
        .product-card .emoji { font-size: 3rem; margin-bottom: 12px; display: block; }
        .product-card .name { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
        .product-card .desc { font-size: 0.75rem; color: var(--text-sec); }
        .section-title { font-size: 1.3rem; font-weight: 700; color: var(--text); margin-bottom: 8px; }
        .section-subtitle { font-size: 0.9rem; color: var(--text-sec); margin-bottom: 20px; }
        .copy-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .copy-card {
            background: white; border: 2px solid var(--border); border-radius: 20px;
            overflow: hidden; cursor: pointer; transition: all 0.3s;
        }
        .copy-card:hover { border-color: var(--brand); transform: translateY(-4px); box-shadow: 0 12px 32px rgba(234,88,12,0.15); }
        .copy-card.selected { border-color: var(--brand); box-shadow: 0 0 0 4px rgba(234,88,12,0.2); }
        .copy-image {
            height: 180px;
            background: linear-gradient(135deg, #fef3c7 0%, #fed7aa 100%);
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }
        .copy-image::before {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 60%);
            animation: shimmer 3s ease-in-out infinite;
        }
        @keyframes shimmer { 0%, 100% { transform: translateX(-30%) translateY(-30%); } 50% { transform: translateX(30%) translateY(30%); } }
        .copy-image .emoji-scene {
            font-size: 4rem; display: flex; gap: 8px; position: relative; z-index: 1;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }
        .copy-badge {
            position: absolute; top: 12px; left: 12px;
            background: var(--brand); color: white;
            padding: 4px 12px; border-radius: 12px; font-size: 0.7rem; font-weight: 700;
        }
        .copy-select-check {
            position: absolute; top: 12px; right: 12px;
            width: 32px; height: 32px; border-radius: 50%;
            background: white; border: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; transition: all 0.2s;
        }
        .copy-card.selected .copy-select-check { background: var(--brand); border-color: var(--brand); color: white; }
        .copy-content { padding: 20px; }
        .copy-headline { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 12px; line-height: 1.4; }
        .copy-story {
            font-size: 0.85rem; color: var(--text-sec); line-height: 1.7;
            margin-bottom: 16px; padding: 12px; background: var(--bg);
            border-radius: 8px; border-left: 3px solid var(--brand);
        }
        .copy-tags { display: flex; flex-wrap: wrap; gap: 6px; }
        .copy-tag { padding: 4px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: 600; }
        .copy-tag.sell { background: var(--success-light); color: var(--success); }
        .copy-tag.aud { background: var(--purple-light); color: var(--purple); }
        .copy-tag.tone { background: #fef3c7; color: #b45309; }
        .detail-panel {
            background: white; border-radius: 20px; padding: 32px;
            margin-top: 24px; border: 2px solid var(--border);
        }
        .detail-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 24px; margin-top: 20px;
        }
        .detail-item { padding: 16px; background: var(--bg); border-radius: 12px; }
        .detail-item .label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .detail-item .label.price { color: #dc2626; }
        .detail-item .label.aud { color: var(--purple); }
        .detail-item .label.ch { color: #2563eb; }
        .detail-item .label.tone { color: var(--brand); }
        .detail-item .val { font-size: 1rem; color: var(--text); line-height: 1.5; }
        .final-preview {
            background: white; border-radius: 20px; overflow: hidden;
            border: 2px solid var(--border); max-width: 600px; margin: 0 auto;
        }
        .final-image {
            height: 280px;
            background: linear-gradient(135deg, #fef3c7 0%, #fed7aa 100%);
            display: flex; align-items: center; justify-content: center; position: relative;
        }
        .final-image .emoji-scene { font-size: 5rem; display: flex; gap: 12px; filter: drop-shadow(0 8px 16px rgba(0,0,0,0.15)); }
        .final-content { padding: 32px; }
        .final-headline { font-size: 1.6rem; font-weight: 800; color: var(--text); margin-bottom: 16px; line-height: 1.4; }
        .final-story {
            font-size: 1rem; color: var(--text-sec); line-height: 1.8;
            margin-bottom: 24px; padding: 20px; background: var(--bg);
            border-radius: 12px; border-left: 4px solid var(--brand);
        }
        .final-details { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 24px; }
        .final-detail-item { padding: 12px; background: var(--bg); border-radius: 8px; }
        .final-detail-item .label { font-size: 0.7rem; font-weight: 700; margin-bottom: 4px; }
        .final-detail-item .val { font-size: 0.9rem; color: var(--text); }
        .btn-group { display: flex; gap: 12px; margin-top: 24px; justify-content: center; flex-wrap: wrap; }
        .btn {
            padding: 14px 32px; border-radius: 12px; font-weight: 700;
            font-size: 1rem; cursor: pointer; transition: all 0.2s; border: none;
        }
        .btn-primary { background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(234,88,12,0.4); }
        .btn-secondary { background: white; border: 2px solid var(--border); color: var(--text); }
        .btn-secondary:hover { border-color: var(--brand); color: var(--brand); }
        .btn-success { background: linear-gradient(135deg, var(--success) 0%, #047857 100%); color: white; }
        .btn-success:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(5,150,105,0.4); }
        .auto-input-section {
            background: white; border-radius: 16px; padding: 24px;
            margin-bottom: 24px; border: 2px solid var(--border);
        }
        .auto-input-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .auto-input-header h3 { font-size: 1rem; font-weight: 700; }
        .auto-input-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
        .auto-input-tag {
            padding: 8px 16px; border-radius: 20px; font-size: 0.85rem;
            font-weight: 600; cursor: pointer; transition: all 0.2s;
            border: 2px solid var(--border); background: white;
        }
        .auto-input-tag:hover { border-color: var(--brand); color: var(--brand); }
        .auto-input-tag.selected { background: var(--brand); border-color: var(--brand); color: white; }
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            display: none; align-items: center; justify-content: center;
            z-index: 1000; padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal { background: white; border-radius: 20px; max-width: 500px; width: 100%; padding: 32px; text-align: center; }
        .modal .emoji { font-size: 4rem; margin-bottom: 16px; }
        .modal h2 { font-size: 1.5rem; margin-bottom: 12px; }
        .modal p { color: var(--text-sec); margin-bottom: 24px; }
        @media (max-width: 768px) {
            .stepper { gap: 6px; }
            .step { padding: 6px 12px; font-size: 0.75rem; }
            .product-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .copy-grid { grid-template-columns: 1fr; }
            .final-details { grid-template-columns: 1fr; }
            .btn-group { flex-direction: column; }
            .btn { width: 100%; }
        }
    </style>
</head>

<div class="header">
    <h1>嚴選美食文案生成器</h1>
    <p>選擇產品 → 選擇賣點 → 確認文案 → 匯出使用</p>
</div>

<div class="stepper">
    <div class="step active" data-step="1">
        <span class="step-num">1</span>
        <span>選擇產品</span>
    </div>
    <div class="step" data-step="2">
        <span class="step-num">2</span>
        <span>選擇賣點</span>
    </div>
    <div class="step" data-step="3">
        <span class="step-num">3</span>
        <span>確認細節</span>
    </div>
    <div class="step" data-step="4">
        <span class="step-num">4</span>
        <span>文案預覽</span>
    </div>
</div>

<div class="container">
    <!-- Step 1: Product Selection -->
    <div class="step-section active" id="step1">
        <div class="section-title">選擇要生成文案的產品</div>
        <div class="section-subtitle">點擊產品卡片，進入下一步選擇賣點</div>
        <div class="product-grid" id="productGrid"></div>
    </div>

    <!-- Step 2: Selling Points & Copy Generation -->
    <div class="step-section" id="step2">
        <div class="section-title" id="step2Title">選擇產品賣點</div>
        <div class="section-subtitle" id="step2Subtitle">每個賣點都有一組專屬文案，點擊選擇你要使用的</div>
        <div id="copyResults">
            <div class="copy-grid" id="copyGrid"></div>
        </div>
        <div class="btn-group">
            <button class="btn btn-secondary" onclick="goToStep(1)">上一步</button>
            <button class="btn btn-primary" onclick="confirmCopy()">確認使用此文案</button>
        </div>
    </div>

    <!-- Step 3: Details Confirmation -->
    <div class="step-section" id="step3">
        <div class="section-title">確認產品細節</div>
        <div class="section-subtitle">確認以下資訊，將一併加入最終文案</div>
        <div class="detail-panel">
            <div class="detail-grid" id="detailGrid"></div>
        </div>
        <div class="btn-group">
            <button class="btn btn-secondary" onclick="goToStep(2)">上一步</button>
            <button class="btn btn-primary" onclick="goToStep(4)">生成最終預覽</button>
        </div>
    </div>

    <!-- Step 4: Final Preview -->
    <div class="step-section" id="step4">
        <div class="section-title">文案預覽</div>
        <div class="section-subtitle">確認無誤後，點擊匯出使用</div>
        <div class="final-preview" id="finalPreview"></div>
        <div class="btn-group">
            <button class="btn btn-secondary" onclick="goToStep(3)">返回修改</button>
            <button class="btn btn-success" onclick="exportFinal()">複製文案</button>
            <button class="btn btn-primary" onclick="showConfirm()">確認送出</button>
        </div>
    </div>
</div>

<!-- Confirmation Modal -->
<div class="modal-overlay" id="confirmModal">
    <div class="modal">
        <div class="emoji">✅</div>
        <h2>文案已確認！</h2>
        <p>您的行銷文案已複製到剪貼簿，可貼上至各大平台上架使用。</p>
        <button class="btn btn-primary" onclick="closeConfirm()">完成</button>
    </div>
</div>

    },
    '限量手工': {
        'default': '在大量生產的時代，手工的溫度更顯珍貴。每一份產品都經過匠人的雙手精心製作，數量有限，品質無限。品嚐<em>限量手工</em>的美味，感受那份獨一無二的用心。'

        'default': '減糖，不是減去美味，而是為健康加分。我們精心調整配方，在保留美味的同時，大幅降低糖分攝取。讓每一口<em>低糖健康</em>的美味，成為你健康生活的美好選擇。'
    }
};

let currentProduct = null;
let selectedSelling = null;
let selectedCopyIdx = null;
let currentStep = 1;

function init() {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = Object.keys(productMeta).map(name => {
        const meta = productMeta[name];
        return `<div class="product-card" onclick="selectProduct('${name}')">
            <span class="emoji">${meta.emoji}</span>
            <div class="name">${name}</div>
            <div class="desc">${meta.pain}</div>
        </div>`;
    }).join('');
}

function selectProduct(name) {
    currentProduct = name;
    document.querySelectorAll('.product-card').forEach(c => c.classList.remove('selected'));
    event.currentTarget.classList.add('selected');
    setTimeout(() => goToStep(2), 300);
}

function goToStep(step) {
    currentStep = step;
    document.querySelectorAll('.step-section').forEach(s => s.classList.remove('active'));
    document.getElementById('step' + step).classList.add('active');
    document.querySelectorAll('.step').forEach(s => {
        const sn = parseInt(s.dataset.step);
        s.classList.remove('active', 'completed');
        if (sn === step) s.classList.add('active');
        else if (sn < step) s.classList.add('completed');
    });
    if (step === 2) generateAllCopies();
    if (step === 3) setupDetails();
    if (step === 4) setupFinalPreview();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function generateAllCopies() {
    const meta = productMeta[currentProduct];
    document.getElementById('step2Title').textContent = `${meta.emoji} ${currentProduct} — 所有賣點文案`;
    document.getElementById('step2Subtitle').textContent = '每個賣點都有一組專屬文案（含產品圖 + 小故事），點擊選擇你要使用的';

    const grid = document.getElementById('copyGrid');
    let html = '';

    Object.entries(sellingPoints).forEach(([sellKey, sellName], idx) => {
        const toneKeys = Object.keys(tones);
        const toneKey = toneKeys[idx % toneKeys.length];
        const tn = tones[toneKey];
        const audKeys = Object.keys(audiences);
        const audKey = audKeys[idx % audKeys.length];
        const aud = audiences[audKey];
        const headline = generateHeadline(currentProduct, sellName, aud, tn);
        const story = generateStory(currentProduct, sellName, aud, tn);
        const visuals = visualScenes[currentProduct] || ['🍽️', '✨', '😋', '💫'];

        html += `<div class="copy-card" data-sell="${sellKey}" onclick="selectCopy('${sellKey}', this)">
            <div class="copy-image">
                <div class="copy-badge">${tn}</div>
                <div class="emoji-scene">${visuals.map(v => `<span>${v}</span>`).join('')}</div>
                <div class="copy-select-check">✓</div>
            </div>
            <div class="copy-content">
                <div class="copy-headline">${headline}</div>
                <div class="copy-story">${story}</div>
                <div class="copy-tags">
                    <span class="copy-tag sell">${sellName}</span>
                    <span class="copy-tag aud">${aud}</span>
                    <span class="copy-tag tone">${tn}</span>
                </div>
            </div>
        </div>`;
    });

    grid.innerHTML = html;
    document.getElementById('copyResults').style.display = 'block';
}

function selectCopy(sellKey, el) {
    document.querySelectorAll('.copy-card').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    selectedSelling = sellKey;
}

function confirmCopy() {
    if (!selectedSelling) { alert('請先選擇一個文案'); return; }
    goToStep(3);
}

function setupDetails() {
    const meta = productMeta[currentProduct];
    const sell = sellingPoints[selectedSelling];
    const toneKeys = Object.keys(tones);
    const toneIdx = Object.keys(sellingPoints).indexOf(selectedSelling);
    const tn = tones[toneKeys[toneIdx % toneKeys.length]];
    const chKeys = Object.keys(channelUrls);
    const ch = chKeys[toneIdx % chKeys.length];

    document.getElementById('detailGrid').innerHTML = `
        <div class="detail-item">
            <div class="label sell">賣點</div>
            <div class="val">${sell}</div>
        </div>
        <div class="detail-item">
            <div class="label price">價格</div>
            <div class="val">${meta.price}</div>
        </div>
        <div class="detail-item">
            <div class="label ch">通路</div>
            <div class="val">${ch}：${channelUrls[ch]}</div>
        </div>
        <div class="detail-item">
            <div class="label tone">語氣</div>
            <div class="val">${tone}</div>
        </div>
    `;
}

function setupFinalPreview() {
    const meta = productMeta[currentProduct];
    const sell = sellingPoints[selectedSelling];
    const toneKeys = Object.keys(tones);
    const toneIdx = Object.keys(sellingPoints).indexOf(selectedSelling);
    const tn = tones[toneKeys[toneIdx % toneKeys.length]];
    const chKeys = Object.keys(channelUrls);
    const ch = chKeys[toneIdx % chKeys.length];
    const audKeys = Object.keys(audiences);
    const aud = audiences[audKeys[toneIdx % audKeys.length]];
    const headline = generateHeadline(currentProduct, sell, aud, tn);
    const story = generateStory(currentProduct, sell, aud, tn);
    const visuals = visualScenes[currentProduct] || ['🍽️', '✨', '😋', '💫'];

    document.getElementById('finalPreview').innerHTML = `
        <div class="final-image">
            <div class="emoji-scene">${visuals.map(v => `<span>${v}</span>`).join('')}</div>
        </div>
        <div class="final-content">
            <div class="final-headline">${headline}</div>
            <div class="final-story">${story}</div>
            <div class="final-details">
                <div class="final-detail-item">
                    <div class="label sell">💰 價格</div>
                    <div class="val">${meta.price}</div>
                </div>
                <div class="final-detail-item">
                    <div class="label ch">🛒 通路</div>
                    <div class="val">${ch}：${channelUrls[ch]}</div>
                </div>
                <div class="final-detail-item">
                    <div class="label tone">🗣️ 語氣</div>
                    <div class="val">${tn}</div>
                </div>
                <div class="final-detail-item">
                    <div class="label aud">✨ 賣點</div>
                    <div class="val">${sell}</div>
                </div>
            </div>
        </div>
    `;
}

function generateHeadline(name, sell, aud, tn) {
    if (tn === '活潑俏皮') return `${name}來了！${sell}讓你一吃就上癮～`;
    if (tn === '溫馨感人') return `給${aud}最暖心的${name}，${sell}的溫柔滋味`;
    if (tn === '專業權威') return `${name}｜${sell}，專業品質保證`;
    if (tn === '簡潔有力') return `${name}，${sell}。就这么簡單。`;
    if (tn === '幽默風趣') return `別再猶豫了！${name}的${sell}，吃了會笑`;
    if (tn === '感性浪漫') return `與${name}的美妙相遇，${sell}的極致體驗`;
    if (tn === '理性分析') return `為什麼選擇我們的${name}？${sell}就是答案`;
    if (tn === '熱血激勵') return `人生苦短，就要吃好的！${name}${sell}`;
    if (tn === '文青風格') return `一碗${name}，一段關於${sell}的故事`;
    if (tn === '正式商務') return `${name}系列｜${sell}，品質之選`;
    if (tn === '輕鬆休閒') return `來點${name}吧！${sell}，享受惬意時光`;
    if (tn === '神秘奢華') return `頂級${name}｜${sell}，尊爵不凡的味覺饗宴`;
    return `${name}｜${sell}，專為${aud}打造`;
}

function generateStory(name, sell, aud, tn) {
    for (const [key, auds] of Object.entries(storyTemplates)) {
        if (sell.includes(key) || key.includes(sell)) {
            return auds[aud] || auds['default'];
        }
    }
    const stories = [
        `在忙碌的生活中，你是否也在尋找一份真實的美味？${name}，帶著${sell}的堅持，走進你的日常。每一口，都是對品質的承諾，對美味的執著。讓這份${tn}的滋味，成為你生活中的小確幸。`,
        `想像一下，當${sell}遇上${aud}，會碰撞出怎樣的火花？${name}，不只是食物，更是一份生活的態度。讓每一次品嚐，都成為值得回味的時刻。`,
        `城市的喧囂中，你值得擁有一份純粹的感動。${name}，以${sell}的精神，為你帶來超越味蕾的體驗。讓這份美味，成為你與美好生活的橋樑。`
    ];
    return stories[Math.floor(Math.random() * stories.length)];
}

function exportFinal() {
    const meta = productMeta[currentProduct];
    const sell = sellingPoints[selectedSelling];
    const toneKeys = Object.keys(tones);
    const toneIdx = Object.keys(sellingPoints).indexOf(selectedSelling);
    const tn = tones[toneKeys[toneIdx % toneKeys.length]];
    const chKeys = Object.keys(channelUrls);
    const ch = chKeys[toneIdx % chKeys.length];
    const audKeys = Object.keys(audiences);
    const aud = audiences[audKeys[toneIdx % audKeys.length]];
    const headline = generateHeadline(currentProduct, sell, aud, tn);
    const story = generateStory(currentProduct, sell, aud, tn);

    const text = `【${currentProduct} 行銷文案】

📝 ${headline}

📖 故事：
${story}

💰 價格：${meta.price}
🛒 通路：${ch}：${channelUrls[ch]}
🗣️ 語氣：${tn}
✨ 賣點：${sell}

🛒 購買連結：${channelUrls[ch]}`;

    navigator.clipboard.writeText(text).then(() => {
        alert('文案已複製到剪貼簿！');
    });
}

function showConfirm() {
    exportFinal();
    document.getElementById('confirmModal').classList.add('open');
}

function closeConfirm() {
    document.getElementById('confirmModal').classList.remove('open');
}

init();
</script>
